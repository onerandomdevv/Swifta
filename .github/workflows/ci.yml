name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev]

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://localhost:5432/dummy"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter @twizrr/backend exec prisma validate --schema=prisma/schema.prisma

      - name: Generate Prisma client
        run: pnpm --filter @twizrr/backend exec prisma generate --schema=prisma/schema.prisma

      - name: Lint all packages
        run: pnpm lint

      - name: Build all packages
        run: pnpm build
